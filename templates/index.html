<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenEval Review</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app">
        <!-- View 1: Paper List -->
        <div id="paper-list-view">
            <header class="top-bar">
                <h1>OpenEval Review</h1>
            </header>
            <main class="container">
                <table id="papers-table">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Paper ID</th>
                            <th>Run</th>
                            <th>Claims</th>
                            <th>Results</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="papers-tbody"></tbody>
                </table>
            </main>
        </div>

        <!-- View 2: Paper Review -->
        <div id="review-view" class="hidden">
            <header class="top-bar">
                <button id="back-btn">&larr; Back</button>
                <h1 id="review-title"></h1>
                <div class="header-controls">
                    <label>Reviewer: <input type="text" id="reviewer-name" placeholder="Your name"></label>
                    <span id="progress-text"></span>
                    <button id="mark-complete-btn">Mark Complete</button>
                </div>
            </header>
            <main class="container" id="results-container"></main>
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
